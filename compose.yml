# Полный стек Onsite: docker compose up с нуля даёт живой /v1/health.
services:
  api:
    build:
      context: .
      target: runtime
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://onsite:onsite@postgres:5432/onsite
      # Ключи обязательны: без них api упадёт на старте с ConfigError.
      # Сгенерировать пару: npx tsx scripts/generate-jwt-keys.ts (значения в .env).
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      ACCESS_TOKEN_TTL_SEC: ${ACCESS_TOKEN_TTL_SEC:-900}
      REFRESH_TOKEN_TTL_SEC: ${REFRESH_TOKEN_TTL_SEC:-2592000}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: onsite-photos
      EXPO_ACCESS_TOKEN: ${EXPO_ACCESS_TOKEN:-}
      PUSH_WORKER_INTERVAL_SEC: ${PUSH_WORKER_INTERVAL_SEC:-10}
      PUSH_RECEIPT_DELAY_MIN: ${PUSH_RECEIPT_DELAY_MIN:-15}
      PUSH_MAX_ATTEMPTS: ${PUSH_MAX_ATTEMPTS:-5}
      RATE_LIMIT_GLOBAL_MAX: ${RATE_LIMIT_GLOBAL_MAX:-200}
      RATE_LIMIT_GLOBAL_WINDOW_MS: ${RATE_LIMIT_GLOBAL_WINDOW_MS:-60000}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-10}
      RATE_LIMIT_AUTH_WINDOW_MS: ${RATE_LIMIT_AUTH_WINDOW_MS:-60000}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy

  # One-shot: применяет миграции и сид перед стартом api.
  # S3_*-поля намеренно не заданы: migrate/seed не создают S3-клиент, ephemeral-хелпер
  # (scripts/ephemeral-jwt-env.ts) подставляет дамми-значения только для валидации конфига.
  migrate:
    build:
      context: .
      target: build
    command: sh -c "npx tsx scripts/migrate.ts && npx tsx scripts/seed.ts"
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://onsite:onsite@postgres:5432/onsite
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: onsite
      POSTGRES_PASSWORD: onsite
      POSTGRES_DB: onsite
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U onsite -d onsite']
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 3s
      timeout: 3s
      retries: 20

  # One-shot: создаёт бакет фотоотчётов.
  minio-init:
    image: minio/mc:latest
    entrypoint: >
      sh -c "mc alias set local http://minio:9000 minioadmin minioadmin &&
             mc mb --ignore-existing local/onsite-photos"
    depends_on:
      minio:
        condition: service_healthy

volumes:
  pg-data:
  minio-data:
