# Релиз: semantic-release (тег + GitHub Release + CHANGELOG) и Docker-образ в GHCR.
# Запускается после успешного CI на main; npm-publish отключён.
name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  # Ручной запуск: докатить Docker-образ для уже существующего релиза.
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      # actions/checkout@v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: true

      # actions/setup-node@v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Установка зависимостей
        run: npm ci

      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      # .release-version создаётся @semantic-release/exec только при новом релизе.
      - name: Определить версию релиза
        id: version
        run: |
          if [ -f .release-version ]; then
            echo "version=$(cat .release-version)" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Нового релиза нет — берём последний существующий тег.
            echo "version=$(git describe --tags --abbrev=0 | sed 's/^v//')" >> "$GITHUB_OUTPUT"
          fi
          # Имя образа в GHCR обязано быть в нижнем регистре.
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # docker/login-action@v3.7.0
      - name: Логин в GHCR
        if: steps.version.outputs.version != ''
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/build-push-action@v6.9.0
      - name: Сборка и публикация образа
        if: steps.version.outputs.version != ''
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.image }}:latest
