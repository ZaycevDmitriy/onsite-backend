# CI: lint, typecheck, build, тесты против postgres:16 + MinIO, валидация OpenAPI.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: onsite
          POSTGRES_PASSWORD: onsite
          POSTGRES_DB: onsite
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onsite -d onsite"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgres://onsite:onsite@localhost:5432/onsite
      # Бакет создают сами интеграционные тесты фото (CreateBucketCommand) — без зависимости от minio-init.
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: onsite-photos

    steps:
      # actions/checkout@v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # actions/setup-node@v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Установка зависимостей
        run: npm ci

      # GitHub service containers не поддерживают override команды, а minio/minio требует
      # явный `server /data` — поэтому MinIO запускается отдельным шагом через `docker run` (решение #17).
      - name: Запуск MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data

      - name: Ожидание готовности MinIO
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null; then
              echo "MinIO готов"
              exit 0
            fi
            sleep 1
          done
          echo "MinIO не запустился за отведённое время" >&2
          exit 1

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build (tsc + tsc-alias)
        run: npm run build

      # Проверка артефакта сборки: алиасы @/* переписаны, модуль импортируется.
      - name: Проверка dist
        run: node --input-type=module -e "await import('./dist/app.js'); console.log('dist ok');"

      - name: Миграции
        run: npm run migrate

      - name: Тесты с покрытием
        run: npm run test:coverage

      - name: Валидация OpenAPI
        run: npm run openapi:validate
